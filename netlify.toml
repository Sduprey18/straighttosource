[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/resolve"
  to = "/.netlify/functions/resolve"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
